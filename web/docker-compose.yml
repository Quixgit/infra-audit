services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infra_audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d infra_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: web/backend/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://audit:${POSTGRES_PASSWORD:-changeme}@postgres:5432/infra_audit?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      ASSETS_DIR: /app/assets
      DATA_DIR: /app/data
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      PORT: "8080"
      # Google OAuth — set values in .env (see .env.example)
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URL: "${GOOGLE_REDIRECT_URL:-}"
      # SMTP (optional)
      # SMTP_HOST: "smtp.gmail.com"
      # SMTP_PORT: "587"
      # SMTP_USER: "you@example.com"
      # SMTP_PASS: "${SMTP_PASS:-}"
      # SMTP_FROM: "noreply@example.com"
    volumes:
      - ../assets:/app/assets:ro
      - reports_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  reports_data:
